<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delivery</title>
</head>
<body>
    <header>
        {% if login %}
        <div class="header_content">
            {% if user.name %}
            <span class="user_name">{{user.name}}</span>
            {% else %}
            <span class="user_name">User{{user.pk}}</span>
            {% endif %}
            <span class="balance">{{user.balance}} BYN</span>
            <a href="/cart/">Корзина</a>
            <a href="/profile/">Профиль</a>
            <a href="/home/">Выход</a>
        </div>
        {% else %}
        <div class="header_content">
            <a href="/login/login/">Вход</a><b>/</b><a href="/login/register/">Регистрация</a>
        </div>
        {% endif %}
    </header>
    <main>
        <div class="container">
            {% for category in categories %}
            <div class="item">
                <div class="item_content">
                    <a href="/category/{{category.pk}}"><img src="{{category.image.url}}"></a>
                    <div class="item_title">
                        <a href="/category/{{category.pk}}"><h2>{{category.name}}</h2></a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </main>
    <footer>
        <div class="footer_content">
            <h3>Some content...</h3>
        </div>
    </footer>
</body>
<style>
    *{
        margin: 0;
    }
    body{
        background: url(/media/images/bg.jpg) no-repeat;
        background-size: cover;
    }
    /* HEADER */
    header{
        color: #424242;
        font-size: 18px;
        background-color: silver;
        height: 50px;
        border-bottom: 5px solid #757575;
    }
    .header_content{
        float: right;
        margin-right: 60px;
        margin-top: 13px;
    }
    header a{
        margin: 0 10px;
        transition: color 0.2s linear;
    }
    .user_name, .balance{
       margin: 0 10px;
       font-weight: bold;
    }
    header a:hover{
        color: white;
    }
    /* MAIN */
    main{
        margin-top: 50px;
        border: 0px;
    }
    main .container{
        display: flex;
        flex-wrap: wrap;
        justify-content: space-around;
    }
    a{
        text-decoration: none;
        color: black;
    }
    .item_content{
        display: flex;
        flex-direction: column;
    }
    .item{
        text-align: center;
        margin: 20px;
    }
    .item img:hover{
        opacity: 0.6;
    }
    .item h2{
        color: #424242;
        transition: color 0.2s linear;
        font-size: 30px;
        margin: 0;
    }
    .item h2:hover{
        color: aliceblue;
    }
    .item_title{
        height: 40px;
        background-color: silver;
        border-bottom: 5px solid #757575;
    }
    .item img{
        transition: opacity 0.2s linear;
        border: 4px solid silver;
        margin: 0;
        width: 450px;
        height: 300px;
    }
    /*FOOTER*/
    footer{
        margin-top: 50px;
        background-color: #212121;
        color: aliceblue;
        height: 300px;
        text-align: center;
    }
</style>
</html>
